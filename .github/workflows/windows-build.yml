name: build-windows

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22.x"]
        arch: ["amd64", "arm64"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w" -o "dist/usb2wsl-${{ matrix.arch }}.exe" ./cmd/usb2wsl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb2wsl-windows-${{ matrix.arch }}
          path: dist/usb2wsl-${{ matrix.arch }}.exe

