name: build-windows

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22.x"]
        arch: ["amd64", "arm64"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w" -o "dist/usb2wsl-${{ matrix.arch }}.exe" ./cmd/usb2wsl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb2wsl-windows-${{ matrix.arch }}
          path: dist/usb2wsl-${{ matrix.arch }}.exe

  release:
    needs: [build]
    runs-on: windows-latest
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: usb2wsl-windows-*
          merge-multiple: true
          path: dist

      - name: Create or update daily release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = (Get-Date -Format "yyyy-MM-dd")
          $title = "Daily build $tag"

          gh --version | Out-Null

          $exists = $true
          try { gh release view $tag | Out-Null } catch { $exists = $false }

          if (-not $exists) {
            gh release create $tag --title $title --notes ""
          } else {
            gh release edit $tag --title $title
          }

          $files = Get-ChildItem -Path dist -Filter "*.exe" | ForEach-Object { $_.FullName }
          if ($files.Count -eq 0) { throw "No .exe files found in dist/" }
          gh release upload $tag $files --clobber
